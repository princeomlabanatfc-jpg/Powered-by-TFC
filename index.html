function attachTimelineDelHandlers(){
  document.querySelectorAll('[data-tl-del]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const review = getReview(reviewDate);
      review.timeline = review.timeline.filter(e=>e.id!==el.dataset.tlDel);
      setReview(reviewDate, review);
      document.getElementById('timelineList').innerHTML = renderTimelineListHTML(review);
      attachTimelineDelHandlers();
    });
  });
}

function attachDailyReviewHandlers(){
  document.getElementById('reviewPrev').addEventListener('click', ()=>{
    const d=new Date(reviewDate+'T00:00:00'); d.setDate(d.getDate()-1);
    reviewDate=clampToStudyRange(fmtDate(d)); renderDailyReview();
  });
  document.getElementById('reviewNext').addEventListener('click', ()=>{
    const d=new Date(reviewDate+'T00:00:00'); d.setDate(d.getDate()+1);
    reviewDate=clampToStudyRange(fmtDate(d)); renderDailyReview();
  });
  const todayBtn = document.getElementById('reviewToday');
  if(todayBtn) todayBtn.addEventListener('click', ()=>{ reviewDate=fmtDate(); renderDailyReview(); });

  document.getElementById('tlAdd').addEventListener('click', ()=>{
    const time = document.getElementById('tlTime').value || '00:00';
    const note = document.getElementById('tlNote').value.trim();
    if(!note){ toast('Add a short note for this hour first.'); return; }
    const review = getReview(reviewDate);
    review.timeline.push({id:'tl_'+Date.now(), time, note});
    setReview(reviewDate, review);
    document.getElementById('tlNote').value='';
    document.getElementById('timelineList').innerHTML = renderTimelineListHTML(review);
    attachTimelineDelHandlers();
  });
  attachTimelineDelHandlers();

  const energySlider = document.getElementById('energySlider');
  energySlider.addEventListener('input', ()=>{
    document.getElementById('energyVal').textContent = energySlider.value;
    const review = getReview(reviewDate); review.energy=parseInt(energySlider.value); setReview(reviewDate, review);
  });
  const focusSlider = document.getElementById('focusSlider');
  focusSlider.addEventListener('input', ()=>{
    document.getElementById('focusVal').textContent = focusSlider.value;
    const review = getReview(reviewDate); review.focus=parseInt(focusSlider.value); setReview(reviewDate, review);
  });

  document.querySelectorAll('[data-mood]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const review = getReview(reviewDate); review.mood=el.dataset.mood; setReview(reviewDate, review);
      renderDailyReview();
    });

  const fieldMap = {rDistractions:'distractions', rWins:'wins', rMistakes:'mistakes', rTomorrow:'tomorrowPlan'};
  Object.keys(fieldMap).forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener('input', ()=>{
      const review = getReview(reviewDate);
      review[fieldMap[id]] = el.value;
      setReview(reviewDate, review);
    });
  });
}

/* ===================== RENDER: ROUTINE WHEEL ===================== */
function polarPoint(cx,cy,r,angleDeg){
  const rad = (angleDeg)*Math.PI/180;
  return {x: cx + r*Math.sin(rad), y: cy - r*Math.cos(rad)};
}
function sectorPath(cx,cy,rInner,rOuter,startDeg,endDeg){
  const p1=polarPoint(cx,cy,rOuter,startDeg), p2=polarPoint(cx,cy,rOuter,endDeg);
  const p3=polarPoint(cx,cy,rInner,endDeg), p4=polarPoint(cx,cy,rInner,startDeg);
  const large = (endDeg-startDeg)>180?1:0;
  return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${rOuter} ${rOuter} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)} L ${p3.x.toFixed(2)} ${p3.y.toFixed(2)} A ${rInner} ${rInner} 0 ${large} 0 ${p4.x.toFixed(2)} ${p4.y.toFixed(2)} Z`;
}
function hourRangeLabel(h){
  const fmt=(n)=>{ const hh=n%24; const ap=hh<12?'AM':'PM'; let d=hh%12; if(d===0)d=12; return d+' '+ap; };
  return `${fmt(h)} – ${fmt(h+1)}`;
}

function buildRoutineWheelSVG(day){
  const size=360, cx=size/2, cy=size/2, rOuter=132, rInner=74, ringR=148;
  const doneCount = day.hours.filter(h=>h.state==='done').length;
  const pct = Math.round(doneCount/24*100);
  const circumference = 2*Math.PI*ringR;
  const offset = circumference - (pct/100)*circumference;
  const gid = 'wheelring'+(__chartIdSeq++);

  let sectors='';
  for(let h=0; h<24; h++){
    const start = h*15+0.9, end=(h+1)*15-0.9;
    const state = day.hours[h].state;
    const fill = state==='done' ? '#10b981' : state==='missed' ? '#ef4444' : 'rgba(255,255,255,0.05)';
    const isSel = selectedRoutineHour===h;
    sectors += `<path class="sector-path ${isSel?'selected':''}" data-hour="${h}" d="${sectorPath(cx,cy,rInner,rOuter,start,end)}" fill="${fill}"><title>${hourRangeLabel(h)}${day.hours[h].label?' — '+day.hours[h].label:''}</title></path>`;
    const midAngle = h*15+7.5;
    const lp = polarPoint(cx,cy,ringR+13,midAngle);
    sectors += `<text class="hour-label-text" x="${lp.x.toFixed(1)}" y="${lp.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle">${h}</text>`;
  }

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#3b6cf6"/>
    </linearGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${ringR}" fill="none" stroke="url(#${gid})" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dashoffset 1s cubic-bezier(.65,0,.35,1);filter:drop-shadow(0 0 6px rgba(16,185,129,0.5));"/>
    ${sectors}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="Sora, sans-serif" font-weight="800" font-size="26" fill="#eef2f0">${pct}%</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5c6f6a">${doneCount}/24 hours</text>
  </svg>`;
}

function renderRoutine(){
  routineDate = clampToStudyRange(routineDate);
  const day = getRoutineDay(routineDate);
  const d = new Date(routineDate+'T00:00:00');
  const label = d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric', year:'numeric'});
  const isToday = routineDate===fmtDate();
  const doneCount = day.hours.filter(h=>h.state==='done').length;
  const missedCount = day.hours.filter(h=>h.state==='missed').length;
  const pendingCount = 24-doneCount-missedCount;

  const weekly = [];
  const base = new Date(routineDate+'T00:00:00');
  for(let i=6;i>=0;i--){
    const dd = new Date(base); dd.setDate(base.getDate()-i);
    const ds = fmtDate(dd);
    const dayData = STATE.routine[ds];
    const done = dayData ? dayData.hours.filter(h=>h.state==='done').length : 0;
    weekly.push({label:dd.getDate()+'', value: Math.round(done/24*100)});
  }

  let html = `
  <div class="view-header">
    <div class="view-title-wrap"><div class="view-title">24-Hour Routine Wheel</div><div class="view-sub">Click an hour to edit it</div></div>
    <div class="day-nav">
      <button id="routinePrev" ${routineDate<='2026-07-01'?'disabled':''}>‹</button>
      <div class="day-label">${label}</div>
      <button id="routineNext" ${routineDate>='2026-12-31'?'disabled':''}>›</button>
      ${!isToday?'<button class="today-btn btn-mini" id="routineToday">Today</button>':''}
    </div>
  </div>

  ${missedCount>=6 ? `<div class="warning-banner"><b>${missedCount} hours missed today.</b> A tough day happens — reset for the next hour instead of writing off the whole day.</div>` : ''}

  <div class="routine-stat-row">
    <div class="stat-box glass-card"><b style="color:var(--success-glow);">${doneCount}</b><span>Done</span></div>
    <div class="stat-box glass-card"><b style="color:var(--danger);">${missedCount}</b><span>Missed</span></div>
    <div class="stat-box glass-card"><b>${pendingCount}</b><span>Pending</span></div>
  </div>

  <div class="wheel-section glass-card" style="padding:24px;">
    <div class="wheel-svg-wrap">${buildRoutineWheelSVG(day)}</div>
    <div class="wheel-side">
      ${selectedRoutineHour!==null ? renderHourEditCardHTML(day) : `<div class="glass-card" style="padding:16px;color:var(--text-faint);font-size:12.5px;">Click any hour on the wheel to mark it done, missed, or add a label.</div>`}
    </div>
  </div>

  <div class="chart-card glass-card">
    <div class="section-title">Last 7 Days</div>
    <div class="chart-note">Daily completion percentage on the wheel.</div>
    ${svgBarChart(weekly, {height:120, unit:'%'})}
  </div>
  `;
  document.getElementById('content').innerHTML = html;
  attachRoutineHandlers();
}

function renderHourEditCardHTML(day){
  const h = selectedRoutineHour;
  const hourData = day.hours[h];
  return `<div class="glass-card hour-edit-card">
    <div class="hour-edit-title">${hourRangeLabel(h)}</div>
    <input type="text" id="hourLabelInput" placeholder="What's this hour for? (e.g. Physics)" value="${escapeHtml(hourData.label||'')}">
    <div class="hour-state-row">
      <button class="hour-state-btn done-btn ${hourData.state==='done'?'active-state':''}" data-hour-state="done">Done</button>
      <button class="hour-state-btn missed-btn ${hourData.state==='missed'?'active-state':''}" data-hour-state="missed">Missed</button>
      <button class="hour-state-btn" data-hour-state="pending">Clear</button>
    </div>
  </div>`;
}

function attachRoutineHandlers(){
  document.getElementById('routinePrev').addEventListener('click', ()=>{
    const d=new Date(routineDate+'T00:00:00'); d.setDate(d.getDate()-1);
    routineDate=clampToStudyRange(fmtDate(d)); selectedRoutineHour=null; renderRoutine();
  });
  document.getElementById('routineNext').addEventListener('click', ()=>{
    const d=new Date(routineDate+'T00:00:00'); d.setDate(d.getDate()+1);
    routineDate=clampToStudyRange(fmtDate(d)); selectedRoutineHour=null; renderRoutine();
  });
  const todayBtn = document.getElementById('routineToday');
  if(todayBtn) todayBtn.addEventListener('click', ()=>{ routineDate=fmtDate(); selectedRoutineHour=null; renderRoutine(); });

  document.querySelectorAll('[data-hour]').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedRoutineHour = parseInt(el.dataset.hour);
      renderRoutine();
    });
  });

  const labelInput = document.getElementById('hourLabelInput');
  if(labelInput){
    labelInput.addEventListener('input', ()=>{
      const day = getRoutineDay(routineDate);
      day.hours[selectedRoutineHour].label = labelInput.value;
      setRoutineDay(routineDate, day);
    });
  }

  document.querySelectorAll('[data-hour-state]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const day = getRoutineDay(routineDate);
      const wasAllDone = day.hours.every(h=>h.state==='done');
      day.hours[selectedRoutineHour].state = el.dataset.hourState;
      const nowAllDone = day.hours.every(h=>h.state==='done');
      setRoutineDay(routineDate, day);
      if(nowAllDone && !wasAllDone && !day.celebrated){
        day.celebrated = true;
        setRoutineDay(routineDate, day);
        celebrate('Perfect Day — 24/24 hours', 100, 20);
        awardXP(100, 20);
      }
      checkAchievements();
      renderRoutine();
    });
  });
}

/* ===================== NAV / TOPBAR ===================== */
function switchView(view){
  if(currentView==='notes' && view!=='notes'){ snapshotIfChanged(notesSubject, notesSelectedChapterId); }
  currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.classList.toggle('active', el.dataset.view===view));
  const titles = {
    dashboard:['Dashboard','System overview'],
    maths:['Mathematics','Syllabus tracker'], physics:['Physics','Syllabus tracker'], chemistry:['Chemistry','Syllabus tracker'],
    challenges:['Challenge System','Daily · Weekly · Monthly'],
    study:['Study Hours','Self study tracker'],
    calendar:['Calendar','1 Jul – 31 Dec 2026'],
    notes:['Notes','Markdown · LaTeX · Autosave'],
    dailyreview:['Daily Review','Reflect on the day'],
    routine:['Routine Wheel','24 hours, your call']
  };
  document.getElementById('topTitle').textContent = titles[view][0];
  document.getElementById('topSub').textContent = titles[view][1];
  renderCurrentView();
}

function renderCurrentView(){
  if(currentView==='dashboard') renderDashboard();
  else if(['maths','physics','chemistry'].includes(currentView)) renderSyllabus(currentView, labelFor(currentView));
  else if(currentView==='challenges') renderChallenges();
  else if(currentView==='study') renderStudyHours();
  else if(currentView==='calendar') renderCalendar();
  else if(currentView==='notes') renderNotes();
  else if(currentView==='dailyreview') renderDailyReview();
  else if(currentView==='routine') renderRoutine();
}

function refreshTopbar(){
  document.getElementById('xpVal').textContent = STATE.profile.xp;
  document.getElementById('coinVal').textContent = STATE.profile.coins;
  document.getElementById('streakVal').textContent = STATE.profile.streak + ' days';
  document.getElementById('levelVal').textContent = STATE.profile.level;
}

function tickCountdown(){
  const target = new Date('2027-01-01T00:00:00');
  const now = new Date();
  let diff = Math.max(0, target-now);
  const days = Math.floor(diff/86400000);
  document.getElementById('countdownVal').textContent = days+'d';
}
setInterval(tickCountdown, 1000);

document.querySelectorAll('.nav-item[data-view]').forEach(el=>{
  el.addEventListener('click', ()=>switchView(el.dataset.view));
});
document.querySelectorAll('.nav-item.locked').forEach(el=>{
  el.addEventListener('click', ()=>toast('This module ships in a later phase — see the roadmap below.'));
});

/* ===================== INIT ===================== */
async function init(){
  await loadState();
  checkAchievements(true);
  tickCountdown();
  refreshTopbar();
  document.querySelector('.nav-item[data-view="dashboard"]').classList.add('active');
  renderDashboard();
}
init();
</script>
