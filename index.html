<style>
:root{
  --bg:#080b0a;
  --bg-2:#0d1210;
  --glass:rgba(255,255,255,0.045);
  --glass-border:rgba(255,255,255,0.09);
  --emerald:#10b981;
  --emerald-deep:#065f46;
  --royal:#3b6cf6;
  --gold:#f0b429;
  --danger:#ef4444;
  --danger-deep:#7f1d1d;
  --warning:#f97316;
  --success-glow:#22c55e;
  --text:#eef2f0;
  --text-dim:#8ea69d;
  --text-faint:#5c6f6a;
  --radius:16px;
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(16,185,129,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(59,108,246,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(16,185,129,0.35);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}

button,input,select,textarea{font-family:inherit;color:inherit;}
button{cursor:pointer;}

.app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:230px;flex-shrink:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
  border-right:1px solid var(--glass-border);
  padding:22px 14px;
  display:flex;flex-direction:column;gap:22px;
  position:sticky;top:0;height:100vh;
}
.logo{display:flex;align-items:center;gap:10px;padding:0 8px;}
.logo-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--emerald),var(--royal));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:13px;color:#04140f;
  box-shadow:0 0 22px rgba(16,185,129,0.45);
}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:0.3px;}
.logo-sub{font-size:9.5px;color:var(--text-faint);letter-spacing:1.5px;text-transform:uppercase;margin-top:-2px;}

.nav-group{display:flex;flex-direction:column;gap:2px;}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-faint);padding:10px 10px 4px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  font-size:13.5px;color:var(--text-dim);
  border:1px solid transparent;background:transparent;
  text-align:left;width:100%;transition:all .15s ease;
  position:relative;
}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);flex-shrink:0;transition:all .15s ease;}
.nav-item:hover{background:rgba(255,255,255,0.045);color:var(--text);}
.nav-item.active{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:var(--text);}
.nav-item.active .dot{background:var(--emerald);box-shadow:0 0 8px var(--emerald);}
.nav-item.locked{opacity:0.45;cursor:not-allowed;}
.nav-item .badge{
  margin-left:auto;font-size:8.5px;font-family:var(--font-mono);
  background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:20px;color:var(--text-faint);
}

.sidebar-foot{margin-top:auto;padding:12px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);}
.streak-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--text-dim);}
.streak-val{font-family:var(--font-mono);color:var(--gold);font-weight:600;}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;background:rgba(8,11,10,0.75);backdrop-filter:blur(14px);z-index:20;
}
.topbar-left{display:flex;flex-direction:column;}
.topbar-title{font-family:var(--font-display);font-size:20px;font-weight:700;}
.topbar-sub{font-size:11.5px;color:var(--text-faint);font-family:var(--font-mono);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.pill{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:20px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:12px;font-family:var(--font-mono);color:var(--text-dim);
}
.pill b{color:var(--text);font-weight:600;}
.pill.xp{border-color:rgba(240,180,41,0.3);}
.pill.xp b{color:var(--gold);}
.pill.coin{border-color:rgba(16,185,129,0.3);}
.pill.coin b{color:var(--emerald);}
.pill.countdown{border-color:rgba(59,108,246,0.3);}
.pill.countdown b{color:var(--royal);}

.content{padding:26px 28px 60px;max-width:1400px;width:100%;margin:0 auto;}

/* ---------- CARDS / GLASS ---------- */
.glass-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);backdrop-filter:blur(10px);
}
.section-title{font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* Dashboard grid */
.dash-grid{display:grid;grid-template-columns:1.1fr 2fr;gap:18px;margin-bottom:20px;}
.hero-card{padding:26px;display:flex;align-items:center;gap:26px;}
.ring-wrap{position:relative;width:132px;height:132px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.06);}
.ring-fg{fill:none;stroke-linecap:round;filter:drop-shadow(0 0 8px rgba(16,185,129,0.55));transition:stroke-dashoffset 1s cubic-bezier(.65,0,.35,1);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-family:var(--font-display);font-size:28px;font-weight:800;}
.ring-label{font-size:9.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;}
.hero-stats{display:flex;flex-direction:column;gap:10px;}
.hero-stats h2{font-family:var(--font-display);font-size:19px;font-weight:700;}
.hero-stats p{font-size:12.5px;color:var(--text-dim);max-width:320px;line-height:1.5;}
.mini-stats{display:flex;gap:18px;margin-top:6px;}
.mini-stat b{display:block;font-family:var(--font-mono);font-size:17px;color:var(--emerald);}
.mini-stat span{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.6px;}

.subject-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.subj-card{padding:18px;cursor:pointer;transition:transform .15s ease, border-color .15s ease;}
.subj-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.18);}
.subj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.subj-name{font-family:var(--font-display);font-weight:700;font-size:14.5px;}
.subj-pct{font-family:var(--font-mono);font-size:13px;color:var(--emerald);}
.bar-track{height:7px;border-radius:6px;background:rgba(255,255,255,0.07);overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--emerald-deep),var(--emerald));transition:width .8s cubic-bezier(.65,0,.35,1);}
.subj-foot{display:flex;justify-content:space-between;margin-top:10px;font-size:10.5px;color:var(--text-faint);font-family:var(--font-mono);}
.subj-foot .backlog-warn{color:var(--danger);}

.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.quick-card{padding:16px;}
.quick-card b{display:block;font-family:var(--font-mono);font-size:22px;}
.quick-card span{font-size:11px;color:var(--text-faint);}

/* ---------- SYLLABUS VIEW ---------- */
.syl-header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.syl-title-wrap{display:flex;align-items:center;gap:14px;}
.syl-title{font-family:var(--font-display);font-weight:800;font-size:22px;}
.syl-progress-mini{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);}
.syl-progress-mini .bar-track{width:120px;}

.controls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
.search-box{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:8px 12px;
}
.search-box input{background:transparent;border:none;outline:none;width:100%;font-size:13px;}
.select-mini, .btn-mini{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;
  padding:8px 10px;font-size:12.5px;color:var(--text-dim);outline:none;
}
.btn-mini{cursor:pointer;transition:all .15s ease;}
.btn-mini:hover{color:var(--text);border-color:rgba(255,255,255,0.25);}
.btn-mini.active{background:rgba(16,185,129,0.14);border-color:rgba(16,185,129,0.4);color:var(--emerald);}

.group-block{margin-bottom:16px;}
.group-header{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:12px;
  cursor:pointer;user-select:none;
}
.group-header .chev{transition:transform .2s ease;font-size:11px;color:var(--text-faint);}
.group-header.collapsed .chev{transform:rotate(-90deg);}
.group-title{font-family:var(--font-display);font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-dim);}
.group-count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}

.chapter-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.chapter-row{
  border:1px solid var(--glass-border);border-radius:12px;background:rgba(255,255,255,0.025);
  overflow:hidden;transition:border-color .2s ease;
}
.chapter-row.backlog{border-color:rgba(239,68,68,0.5);animation:pulseBorder 1.8s infinite;}
@keyframes pulseBorder{
  0%,100%{box-shadow:0 0 0 rgba(239,68,68,0);}
  50%{box-shadow:0 0 14px rgba(239,68,68,0.45);}
}
.chapter-row.completed{border-color:rgba(34,197,94,0.35);}
.row-main{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;}
.complete-toggle{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--text-faint);display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;background:transparent;
}
.complete-toggle.done{background:var(--success-glow);border-color:var(--success-glow);box-shadow:0 0 10px rgba(34,197,94,0.6);}
.complete-toggle svg{width:12px;height:12px;opacity:0;transition:opacity .15s ease;}
.complete-toggle.done svg{opacity:1;}
.ch-name{font-size:13.5px;font-weight:500;flex:1;min-width:120px;}
.ch-name.done-text{color:var(--text-dim);text-decoration:line-through;text-decoration-color:rgba(34,197,94,0.5);}
.chip{font-size:9.5px;font-family:var(--font-mono);padding:3px 8px;border-radius:20px;border:1px solid var(--glass-border);color:var(--text-faint);white-space:nowrap;}
.chip.priority-High{color:var(--danger);border-color:rgba(239,68,68,0.35);}
.chip.priority-Medium{color:var(--warning);border-color:rgba(249,115,22,0.35);}
.chip.priority-Low{color:var(--text-dim);}
.chip.backlog-chip{color:var(--danger);border-color:var(--danger);background:rgba(239,68,68,0.12);animation:blink 1.4s infinite;}
@keyframes blink{50%{opacity:0.4;}}
.mini-counts{display:flex;gap:10px;font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);}
.row-chev{color:var(--text-faint);font-size:11px;transition:transform .2s ease;}
.row-chev.open{transform:rotate(90deg);}

.row-detail{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  border-top:1px solid transparent;
}
.row-detail.open{max-height:900px;border-top:1px solid var(--glass-border);}
.detail-inner{padding:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-faint);}
.field input[type=text],.field input[type=date],.field select,.field textarea{
  background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:8px;
  padding:7px 9px;font-size:12.5px;outline:none;
}
.field textarea{resize:vertical;min-height:52px;font-family:var(--font-body);}
.field.span2{grid-column:span 2;}
.field.span4{grid-column:span 4;}
.counter{display:flex;align-items:center;gap:8px;}
.counter button{width:22px;height:22px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);font-size:13px;line-height:1;}
.counter span{font-family:var(--font-mono);min-width:18px;text-align:center;}
.check-field{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);}
.check-field input{accent-color:var(--emerald);width:14px;height:14px;}
.color-dots{display:flex;gap:6px;}
.color-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-dot.selected{border-color:#fff;}
.rating-stars{display:flex;gap:3px;cursor:pointer;}
.rating-stars span{color:var(--text-faint);font-size:15px;}
.rating-stars span.on{color:var(--gold);}

/* ---------- MODALS ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease;
}
.overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg-2);border:1px solid var(--glass-border);border-radius:16px;
  padding:24px;width:340px;text-align:center;transform:translateY(10px);transition:transform .2s ease;
}
.overlay.show .modal{transform:translateY(0);}
.modal.danger-modal{border-color:rgba(239,68,68,0.4);box-shadow:0 0 40px rgba(239,68,68,0.15);}
.modal.success-modal{border-color:rgba(34,197,94,0.4);box-shadow:0 0 40px rgba(34,197,94,0.15);}
.modal h3{font-family:var(--font-display);font-size:16px;margin-bottom:8px;}
.modal p{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:18px;}
.modal-actions{display:flex;gap:10px;}
.modal-actions button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);font-size:13px;font-weight:600;}
.btn-primary{background:var(--emerald)!important;color:#04140f!important;border-color:var(--emerald)!important;}
.btn-danger{background:var(--danger)!important;color:#fff!important;border-color:var(--danger)!important;}

.celebrate-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s ease;
}
.celebrate-overlay.show{opacity:1;}
.celebrate-card{
  background:linear-gradient(160deg, rgba(16,185,129,0.18), rgba(8,11,10,0.9));
  border:1px solid rgba(16,185,129,0.5);border-radius:18px;padding:26px 34px;text-align:center;
  box-shadow:0 0 60px rgba(16,185,129,0.35);
}
.celebrate-card .big{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--emerald);margin-bottom:6px;}
.celebrate-card .quote{font-size:12px;color:var(--text-dim);max-width:280px;margin:8px auto 0;font-style:italic;}
.celebrate-card .rewards{display:flex;gap:16px;justify-content:center;margin-top:12px;font-family:var(--font-mono);font-size:13px;}
.celebrate-card .rewards b{color:var(--gold);}
.confetti-piece{position:absolute;width:7px;height:7px;top:-10px;opacity:0.9;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}

.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300;}
.toast{
  background:var(--bg-2);border:1px solid var(--glass-border);border-radius:10px;padding:11px 16px;
  font-size:12.5px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:toastIn .25s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

.locked-view{padding:60px 20px;text-align:center;color:var(--text-faint);}
.locked-view .tag{display:inline-block;margin-top:10px;font-family:var(--font-mono);font-size:11px;padding:6px 14px;border:1px solid var(--glass-border);border-radius:20px;}

/* ---------- PHASE 2: SHARED WIDGETS ---------- */
.view-header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.view-title-wrap{display:flex;flex-direction:column;}
.view-title{font-family:var(--font-display);font-weight:800;font-size:22px;}
.view-sub{font-size:11.5px;color:var(--text-faint);font-family:var(--font-mono);margin-top:2px;}
.btn-add{
  display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;
  background:linear-gradient(135deg,var(--emerald),var(--royal));color:#04140f;font-weight:700;font-size:12.5px;
  border:none;box-shadow:0 0 18px rgba(16,185,129,0.3);transition:transform .15s ease;
}
.btn-add:hover{transform:translateY(-1px);}

.chart-card{padding:16px 18px;margin-bottom:16px;}
.chart-card .section-title{margin-bottom:2px;}
.chart-card .chart-note{font-size:10.5px;color:var(--text-faint);margin-bottom:10px;}

.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
.stat-box{padding:14px 16px;}
.stat-box b{display:block;font-family:var(--font-mono);font-size:20px;}
.stat-box span{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;}

/* Timer */
.timer-card{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;margin-bottom:16px;flex-wrap:wrap;gap:16px;}
.timer-display{font-family:var(--font-mono);font-size:38px;font-weight:600;letter-spacing:1px;}
.timer-display.running{color:var(--emerald);text-shadow:0 0 16px rgba(16,185,129,0.5);}
.timer-controls{display:flex;gap:8px;}
.timer-btn{padding:9px 16px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);font-size:12.5px;font-weight:600;}
.timer-btn.start{background:var(--emerald);color:#04140f;border-color:var(--emerald);}
.timer-btn.stop{background:var(--danger);color:#fff;border-color:var(--danger);}

/* Heatmap */
.heatmap-wrap{display:flex;flex-direction:column;gap:9px;}
.heatmap-month-row{display:flex;align-items:center;gap:10px;}
.heatmap-month-label{width:30px;font-size:10px;color:var(--text-faint);font-family:var(--font-mono);flex-shrink:0;}
.heatmap-cells{display:flex;gap:3px;flex-wrap:wrap;}
.heatmap-cell{width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,0.05);}
.heatmap-cell.lvl1{background:rgba(16,185,129,0.28);}
.heatmap-cell.lvl2{background:rgba(16,185,129,0.5);}
.heatmap-cell.lvl3{background:rgba(16,185,129,0.75);}
.heatmap-cell.lvl4{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,0.7);}

/* Achievements */
.achv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:22px;}
.achv-badge{padding:12px 10px;text-align:center;border-radius:14px;opacity:0.4;filter:grayscale(1);transition:all .2s ease;}
.achv-badge.unlocked{opacity:1;filter:none;border-color:rgba(240,180,41,0.4);background:rgba(240,180,41,0.06);}
.achv-icon{
  width:38px;height:38px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--emerald),var(--royal));font-family:var(--font-mono);font-weight:700;font-size:11px;color:#04140f;
}
.achv-badge.unlocked .achv-icon{background:linear-gradient(135deg,var(--gold),#fbbf24);box-shadow:0 0 14px rgba(240,180,41,0.5);}
.achv-name{font-size:10.5px;font-weight:600;}
.achv-desc{font-size:9px;color:var(--text-faint);margin-top:2px;line-height:1.3;}

/* Challenge cards */
.challenge-section{margin-bottom:26px;}
.challenge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-top:12px;}
.challenge-card{padding:15px;position:relative;transition:border-color .2s ease;}
.challenge-card.status-completed{border-color:rgba(34,197,94,0.4);}
.challenge-card.status-failed{border-color:rgba(239,68,68,0.35);opacity:0.75;}
.challenge-card.overdue{border-color:rgba(249,115,22,0.5);}
.card-close{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--text-faint);font-size:11px;line-height:1;}
.card-close:hover{background:rgba(239,68,68,0.2);color:var(--danger);}
.challenge-name{font-family:var(--font-display);font-weight:700;font-size:13.5px;padding-right:22px;margin-bottom:4px;}
.challenge-target{font-size:11.5px;color:var(--text-dim);margin-bottom:8px;line-height:1.4;min-height:14px;}
.challenge-meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.challenge-progress-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.progress-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);font-size:12px;flex-shrink:0;}
.challenge-progress-pct{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);width:34px;text-align:center;flex-shrink:0;}
.challenge-bottom-row{display:flex;align-items:center;gap:10px;}
.chal-link{font-size:10.5px;color:var(--text-faint);text-decoration:underline;background:none;border:none;flex-shrink:0;}
.chal-link:hover{color:var(--danger);}
.reward-text{font-size:10px;color:var(--gold);font-family:var(--font-mono);flex:1;}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-nav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);font-size:14px;}
.cal-nav button:disabled{opacity:0.3;cursor:not-allowed;}
.cal-month-label{font-family:var(--font-display);font-weight:700;font-size:14px;min-width:140px;text-align:center;}
.cal-legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-dim);}
.cal-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:9.5px;color:var(--text-faint);text-align:center;padding-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.cal-cell{
  aspect-ratio:1;border-radius:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02);
  padding:6px;display:flex;flex-direction:column;justify-content:space-between;transition:all .15s ease;cursor:default;
}
.cal-cell:hover{transform:scale(1.05);border-color:rgba(255,255,255,0.25);z-index:2;}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.today{border-color:var(--emerald);box-shadow:0 0 12px rgba(16,185,129,0.4);}
.cal-cell.holiday{background:rgba(240,180,41,0.08);border-color:rgba(240,180,41,0.35);}
.cal-daynum{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
.cal-cell.today .cal-daynum{color:var(--emerald);font-weight:700;}
.cal-holiday-label{font-size:8px;color:var(--gold);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--royal);}
.countdown-strip{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.countdown-strip .stat-box{flex:1;min-width:120px;}

/* Form modal */
.modal.form-modal{width:400px;text-align:left;max-height:80vh;overflow-y:auto;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.form-grid .field.span2{grid-column:span 2;}
.form-grid input,.form-grid select{width:100%;}

/* ---------- PHASE 3: NOTES ---------- */
.notes-layout{display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start;}
.notes-side{padding:14px;max-height:74vh;overflow-y:auto;}
.notes-search{margin-bottom:10px;}
.notes-group-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-faint);padding:8px 4px 4px;}
.notes-chapter-item{
  display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;
  font-size:12.5px;color:var(--text-dim);border:1px solid transparent;
}
.notes-chapter-item:hover{background:rgba(255,255,255,0.04);}
.notes-chapter-item.active{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:var(--text);}
.notes-chapter-item .pin-star{color:var(--gold);flex-shrink:0;font-size:11px;}
.notes-chapter-item .has-dot{width:5px;height:5px;border-radius:50%;background:var(--royal);flex-shrink:0;}
.notes-chapter-item .tiny-tags{margin-left:auto;display:flex;gap:3px;}
.notes-tag-chip{font-size:8px;font-family:var(--font-mono);padding:1px 6px;border-radius:8px;background:rgba(59,108,246,0.15);color:var(--royal);white-space:nowrap;cursor:pointer;}

.editor-card{padding:0;overflow:hidden;}
.editor-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--glass-border);flex-wrap:wrap;gap:8px;}
.editor-title{font-family:var(--font-display);font-weight:700;font-size:15px;}
.editor-meta{display:flex;align-items:center;gap:8px;}
.save-indicator{font-size:10px;color:var(--text-faint);font-family:var(--font-mono);}
.pin-toggle{background:none;border:1px solid var(--glass-border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text-dim);}
.pin-toggle.pinned{color:var(--gold);border-color:rgba(240,180,41,0.4);background:rgba(240,180,41,0.08);}
.editor-toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--glass-border);}
.editor-btn{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:7px;padding:6px 10px;font-size:11.5px;color:var(--text-dim);}
.editor-btn:hover{color:var(--text);}
.editor-btn.tab-active{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--emerald);}
.editor-tags-row{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--glass-border);flex-wrap:wrap;}
.editor-tags-row input{flex:1;min-width:140px;background:rgba(0,0,0,0.2);border:1px solid var(--glass-border);border-radius:8px;padding:6px 10px;font-size:12px;}
.editor-textarea{width:100%;min-height:380px;background:transparent;border:none;outline:none;font-family:var(--font-mono);font-size:13px;line-height:1.65;padding:18px;resize:vertical;display:block;}
.preview-pane{padding:18px;line-height:1.75;font-size:13.5px;min-height:380px;}
.preview-pane h1,.preview-pane h2,.preview-pane h3{font-family:var(--font-display);margin:14px 0 8px;color:var(--text);}
.preview-pane h1{font-size:19px;} .preview-pane h2{font-size:16px;} .preview-pane h3{font-size:14px;}
.preview-pane p{margin-bottom:10px;color:var(--text-dim);}
.preview-pane ul,.preview-pane ol{margin:0 0 10px 20px;color:var(--text-dim);}
.preview-pane code{background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-family:var(--font-mono);font-size:12px;}
.preview-pane pre{background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;overflow-x:auto;margin-bottom:10px;}
.preview-pane blockquote{border-left:2px solid var(--emerald);padding-left:12px;color:var(--text-faint);margin-bottom:10px;}
.preview-pane img{max-width:100%;border-radius:10px;margin:8px 0;}
.preview-pane a{color:var(--royal);}
.preview-empty{color:var(--text-faint);font-size:12.5px;text-align:center;padding:60px 20px;}

.history-panel{border-top:1px solid var(--glass-border);padding:14px 18px;max-height:220px;overflow-y:auto;}
.history-entry{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);margin-bottom:6px;font-size:11.5px;}
.history-entry button{background:none;border:1px solid var(--glass-border);border-radius:6px;padding:3px 9px;font-size:10.5px;color:var(--text-dim);}
.history-empty{font-size:11.5px;color:var(--text-faint);}

/* ---------- PHASE 3: DAY NAV (shared: Daily Review + Routine Wheel) ---------- */
.day-nav{display:flex;align-items:center;gap:10px;justify-content:center;}
.day-nav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);font-size:14px;}
.day-nav button:disabled{opacity:0.3;cursor:not-allowed;}
.day-nav .day-label{font-family:var(--font-display);font-weight:700;font-size:14px;min-width:190px;text-align:center;}
.day-nav .today-btn{width:auto;padding:0 12px;font-size:11px;font-family:var(--font-mono);}

/* ---------- PHASE 3: DAILY REVIEW ---------- */
.reflect-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.timeline-add{display:flex;gap:8px;margin-bottom:10px;}
.timeline-add input[type=time]{width:100px;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:8px;padding:7px 9px;font-size:12px;}
.timeline-add input[type=text]{flex:1;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:8px;padding:7px 9px;font-size:12px;}
.timeline-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.timeline-entry{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.025);border:1px solid var(--glass-border);}
.timeline-time{font-family:var(--font-mono);font-size:11px;color:var(--royal);flex-shrink:0;width:56px;}
.timeline-note{flex:1;font-size:12.5px;}
.timeline-del{background:none;border:none;color:var(--text-faint);font-size:12px;}
.timeline-del:hover{color:var(--danger);}
.timeline-empty{font-size:12px;color:var(--text-faint);padding:10px 0;}

.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.slider-row input[type=range]{flex:1;accent-color:var(--emerald);}
.slider-val{font-family:var(--font-mono);font-size:13px;color:var(--emerald);width:16px;text-align:center;}
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.mood-btn{padding:8px 6px;border-radius:9px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02);font-size:11px;color:var(--text-dim);}
.mood-btn.selected{background:rgba(16,185,129,0.15);border-color:var(--emerald);color:var(--emerald);}
.reflect-field{margin-bottom:16px;}
.reflect-field label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-faint);display:block;margin-bottom:6px;}
.reflect-field textarea{
  width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--glass-border);border-radius:10px;
  padding:10px 12px;font-size:12.5px;color:var(--text);min-height:70px;resize:vertical;outline:none;
}

/* ---------- PHASE 3: ROUTINE WHEEL ---------- */
.wheel-section{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.wheel-svg-wrap{flex-shrink:0;}
.sector-path{cursor:pointer;transition:opacity .15s ease, filter .15s ease;}
.sector-path:hover{opacity:0.82;}
.sector-path.selected{stroke:#fff;stroke-width:1.5;}
.hour-label-text{font-family:var(--font-mono);font-size:8px;fill:#5c6f6a;}
.wheel-side{flex:1;min-width:260px;max-width:340px;}
.hour-edit-card{padding:16px;margin-bottom:14px;}
.hour-edit-title{font-family:var(--font-display);font-weight:700;font-size:14px;margin-bottom:10px;}
.hour-state-row{display:flex;gap:8px;margin-top:10px;}
.hour-state-btn{flex:1;padding:8px;border-radius:9px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.03);font-size:11.5px;font-weight:600;}
.hour-state-btn.done-btn{color:var(--success-glow);}
.hour-state-btn.done-btn.active-state{background:rgba(34,197,94,0.18);border-color:var(--success-glow);}
.hour-state-btn.missed-btn{color:var(--danger);}
.hour-state-btn.missed-btn.active-state{background:rgba(239,68,68,0.18);border-color:var(--danger);}
.hour-edit-card input[type=text]{width:100%;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;font-size:12.5px;margin-top:6px;}
.routine-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.warning-banner{
  border:1px solid rgba(239,68,68,0.5);background:rgba(239,68,68,0.08);border-radius:14px;
  padding:14px 18px;margin-bottom:16px;font-size:12.5px;color:var(--text-dim);animation:pulseBorder 2.4s infinite;
}
.warning-banner b{color:var(--danger);}

@media(max-width:900px){
  .notes-layout{grid-template-columns:1fr;}
  .reflect-grid{grid-template-columns:1fr;}
  .wheel-section{flex-direction:column;align-items:center;}
  .stat-strip{grid-template-columns:repeat(2,1fr);}
  .cal-grid{gap:4px;}
  .cal-holiday-label{display:none;}
  .sidebar{display:none;}
  .dash-grid{grid-template-columns:1fr;}
  .subject-cards{grid-template-columns:1fr;}
  .quick-grid{grid-template-columns:repeat(2,1fr);}
  .detail-inner{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

/* ===================== DATA ===================== */
const MATHS_CH = ["Sets","Relations","Functions","Trigonometry","Complex Numbers","Quadratic Equations","Fundamentals of Mathematics","Permutations and Combinations","Binomial Theorem","Sequence and Series","Straight Lines","Pair of Straight Lines","Circle","Parabola","Ellipse","Hyperbola","Limits","Continuity","Differentiability","Statistics","Probability","Matrices","Determinants","Inverse Trigonometric Functions","Continuity and Differentiability","Application of Derivatives","Indefinite Integration","Definite Integration","Area Under Curves","Differential Equations","Vector Algebra","Three Dimensional Geometry","Probability Distribution"];

  {group:"Class 11 · Organic Chemistry", chapters:["Purification and Characterisation of Organic Compounds","General Organic Chemistry (GOC)","Isomerism","Hydrocarbons"]},
  {group:"Class 12 · Physical Chemistry", chapters:["Solid State","Solutions","Electrochemistry","Chemical Kinetics","Surface Chemistry (Removed)"]},
  {group:"Class 12 · Inorganic Chemistry", chapters:["General Principles and Processes of Isolation of Elements — Metallurgy (Partially Reduced)","p-Block Elements (Class 12 Part)","d and f Block Elements","Coordination Compounds","Environmental Chemistry (Removed)"]},

/* ===================== REUSABLE SVG CHARTS ===================== */
let __chartIdSeq = 0;

function svgRing(pct, opts={}){
  const size = opts.size||132, stroke=opts.stroke||10;
  const r = (size-stroke)/2;
  const circumference = 2*Math.PI*r;
  const p = Math.min(100,Math.max(0,pct));
  const offset = circumference - (p/100)*circumference;
  const gid = 'ring'+(__chartIdSeq++);
  const big = opts.big!==undefined ? opts.big : p+'%';
  const label = opts.label||'';
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <defs><linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="${opts.color1||'#10b981'}"/><stop offset="100%" stop-color="${opts.color2||'#3b6cf6'}"/>
      </linearGradient></defs>
      <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" style="stroke-width:${stroke}px;"/>
      <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" style="stroke-width:${stroke}px;stroke:url(#${gid});" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="ring-center"><div class="ring-num" style="font-size:${Math.round(size*0.19)}px;">${big}</div><div class="ring-label">${label}</div></div>
  </div>`;
}

function svgBarChart(data, opts={}){
  const width=opts.width||600, height=opts.height||170;
  const padL=30,padB=data.length<=31?22:16,padT=12,padR=10;
  const chartW=width-padL-padR, chartH=height-padT-padB;
  const max = Math.max(1, opts.goalLine||0, ...data.map(d=>d.value));
  const bw = chartW/Math.max(1,data.length);
  const gid = 'bar'+(__chartIdSeq++);
  let bars='';
  data.forEach((d,i)=>{
    const h = (d.value/max)*chartH;
    const x = padL + i*bw + bw*0.16;
    const y = padT + chartH - h;
    const w = Math.max(1,bw*0.68);
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="3" fill="url(#${gid})"><title>${d.label}: ${d.value.toFixed(1)}${opts.unit||''}</title></rect>`;
    if(data.length<=16){
      bars += `<text x="${(x+w/2).toFixed(1)}" y="${height-6}" font-size="8.5" fill="#5c6f6a" text-anchor="middle" font-family="JetBrains Mono, monospace">${d.label}</text>`;
    }
  });
  let goalSvg='';
  if(opts.goalLine){
    const gy = padT + chartH - (opts.goalLine/max)*chartH;
    goalSvg = `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${width-padR}" y2="${gy.toFixed(1)}" stroke="#f0b429" stroke-width="1.3" stroke-dasharray="4 3" opacity="0.7"/>`;
  }
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="${opts.color1||'#065f46'}"/><stop offset="100%" stop-color="${opts.color2||'#10b981'}"/>
    </linearGradient></defs>
    ${bars}${goalSvg}
  </svg>`;
}

function svgLineChart(data, opts={}){
  const width=opts.width||600, height=opts.height||150;
  const padL=30,padB=18,padT=12,padR=12;
  const chartW=width-padL-padR, chartH=height-padT-padB;
  const max = Math.max(1, ...data.map(d=>d.value));
  const stepX = data.length>1 ? chartW/(data.length-1) : 0;
  const pts = data.map((d,i)=>[padL+i*stepX, padT+chartH-(d.value/max)*chartH]);
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const gid = 'line'+(__chartIdSeq++);
  const areaPath = pts.length ? linePath+` L${pts[pts.length-1][0].toFixed(1)},${(padT+chartH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+chartH).toFixed(1)} Z` : '';
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${opts.color||'#10b981'}" stop-opacity="0.32"/><stop offset="100%" stop-color="${opts.color||'#10b981'}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#${gid})" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="${opts.color||'#10b981'}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${opts.color||'#10b981'}"><title>${data[i].label}: ${data[i].value.toFixed(1)}</title></circle>`).join('')}
  </svg>`;
}

/* ===================== HELPERS: STUDY HOURS ===================== */
function totalStudyHours(){ return Object.values(STATE.study.log).reduce((a,b)=>a+b,0); }
function hoursForDate(d){ return STATE.study.log[d]||0; }
function startOfWeek(date){
  const d = new Date(date); const day=(d.getDay()+6)%7;
  d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d;
}
function currentWeekTotal(){
  const start = startOfWeek(new Date());
  let sum=0;
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    sum += hoursForDate(fmtDate(d));
  }
  return sum;
}
function computeStreak(){
  let cursor = new Date(); cursor.setHours(0,0,0,0);
  if(!(hoursForDate(fmtDate(cursor))>0)) cursor.setDate(cursor.getDate()-1);
  let streak=0;
  while(streak<1000){
    const ds = fmtDate(cursor);
    if(hoursForDate(ds)>0){ streak++; cursor.setDate(cursor.getDate()-1); } else break;
  }
  return streak;
}
function bestWorstDay(){
  const entries = Object.entries(STATE.study.log).filter(([,h])=>h>0);
  if(!entries.length) return {best:null, worst:null};
  let best=entries[0], worst=entries[0];
  entries.forEach(e=>{ if(e[1]>best[1]) best=e; if(e[1]<worst[1]) worst=e; });
  return {best:{date:best[0],hours:best[1]}, worst:{date:worst[0],hours:worst[1]}};
}
function rollingAverageSeries(days=30){
  const out=[]; const today = new Date(); today.setHours(0,0,0,0);
  const rangeStart = new Date(2026,6,1);
  for(let i=days-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    let sum=0;
    for(let j=0;j<7;j++){
      const dd = new Date(d); dd.setDate(d.getDate()-j);
      if(dd < rangeStart) continue;
      sum += hoursForDate(fmtDate(dd));
    }
    out.push({label:(d.getMonth()+1)+'/'+d.getDate(), value: sum/7});
  }
  return out;
}
function last14DaysSeries(){
  const out=[]; const today = new Date(); today.setHours(0,0,0,0);
  for(let i=13;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    out.push({label:d.getDate()+'', value: hoursForDate(fmtDate(d))});
  }
  return out;
}
function yearMonthSeries(){
  const names=['Jul','Aug','Sep','Oct','Nov','Dec'];
  return names.map((n,i)=>{
    const monthIdx = 6+i;
    const dim = new Date(2026, monthIdx+1, 0).getDate();
    let sum=0;
    for(let day=1; day<=dim; day++){ sum += hoursForDate(fmtDate(new Date(2026,monthIdx,day))); }
    return {label:n, value: Math.round(sum*10)/10};
  });
}

function snapshotIfChanged(subject, chapterId, force){
  if(!chapterId) return false;
  const note = getNote(subject, chapterId);
  const last = note.history[note.history.length-1];
  const changed = note.content && (!last || last.content !== note.content);
  if(changed || (force && note.content)){
    note.history.push({ts:Date.now(), content:note.content});
    if(note.history.length>15) note.history.shift();
    setNote(subject, chapterId, note);
    return true;
  }
  return false;
}

            <div class="subj-foot"><span>${st.done}/${st.total} chapters</span><span class="${st.backlog>0?'backlog-warn':''}">${st.backlog>0? st.backlog+' backlog':'On track'}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="glass-card" style="padding:18px;">
    <div class="section-title">Quick Stats</div>
    <div class="quick-grid">
      <div class="quick-card glass-card"><b>${o.pct}%</b><span>Syllabus Completion</span></div>
      <div class="quick-card glass-card"><b id="qLevel">${STATE.profile.level}</b><span>Current Level</span></div>
      <div class="quick-card glass-card"><b id="qXp">${STATE.profile.xp}</b><span>Total XP</span></div>
      <div class="quick-card glass-card"><b style="color:${o.backlog>0?'var(--danger)':'var(--emerald)'}">${o.backlog}</b><span>Chapters in Backlog</span></div>
    </div>
  </div>`;
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.subj-card').forEach(el=>el.addEventListener('click',()=>switchView(el.dataset.view)));
}

/* ===================== RENDER: SYLLABUS ===================== */
function chapterMatchesFilters(c){
  if(searchTerm && !c.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
  if(filterBacklogOnly && !c.backlog) return false;
  if(filterPriority && c.priority!==filterPriority) return false;
  return true;
}

function renderSyllabus(subj, label){
  const st = subjectStats(subj);
  let html = `
  <div class="syl-header">
    <div class="syl-title-wrap">
      <div class="syl-title">${label}</div>
      <div class="syl-progress-mini"><div class="bar-track"><div class="bar-fill" style="width:${st.pct}%"></div></div>${st.done}/${st.total} · ${st.pct}%</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-mini" id="expandAll">Expand groups</button>
      <button class="btn-mini" id="collapseAll">Collapse groups</button>
    </div>
  </div>

  <div class="controls-row">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search chapters..." value="${searchTerm}"></div>
    <select class="select-mini" id="priorityFilter">
      <option value="">All priorities</option>
      <option value="High">High priority</option>
      <option value="Medium">Medium priority</option>
      <option value="Low">Low priority</option>
    </select>
    <button class="btn-mini ${filterBacklogOnly?'active':''}" id="backlogFilterBtn">Backlog only</button>
  </div>
  `;

  STATE[subj].forEach((g, gi)=>{
    const visible = g.chapters.filter(chapterMatchesFilters);
    if(visible.length===0 && (searchTerm||filterBacklogOnly||filterPriority)) return;
    const collapsed = collapsedGroups[subj+gi];
    const doneCount = g.chapters.filter(c=>c.completed).length;
    html += `<div class="group-block">
      <div class="group-header ${collapsed?'collapsed':''}" data-gkey="${subj+gi}">
        <span class="chev">▾</span>
        <span class="group-title">${g.group}</span>
        <span class="group-count">${doneCount}/${g.chapters.length}</span>
      </div>
      <div class="chapter-list" style="display:${collapsed?'none':'flex'}">
        ${visible.map(c=>renderChapterRow(c)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
  attachSyllabusHandlers(subj);
}

function renderChapterRow(c){
  const open = openRows[c.id];
  return `
  <div class="chapter-row ${c.backlog?'backlog':''} ${c.completed?'completed':''}" data-id="${c.id}">
    <div class="row-main" data-row-toggle="${c.id}">
      <button class="complete-toggle ${c.completed?'done':''}" data-complete-toggle="${c.id}">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#04140f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="ch-name ${c.completed?'done-text':''}">${c.name}</div>
      ${c.backlog?'<span class="chip backlog-chip">BACKLOG</span>':''}
      <span class="chip priority-${c.priority}">${c.priority}</span>
      <span class="chip">${c.difficulty}</span>
      <div class="mini-counts"><span>R ${c.revisionCount}</span><span>P ${c.practiceCount}</span><span>M ${c.mockTestCount}</span></div>
      <span class="row-chev ${open?'open':''}">›</span>
    </div>
    <div class="row-detail ${open?'open':''}" id="detail-${c.id}">
      ${open ? renderDetail(c) : ''}
    </div>
  </div>`;
}

function renderDetail(c){
  return `
  <div class="detail-inner">
    <div class="field span2"><label>Weak Points</label><textarea data-field="weakPoints" data-id="${c.id}">${c.weakPoints}</textarea></div>
    <div class="field span2"><label>Notes</label><textarea data-field="notes" data-id="${c.id}">${c.notes}</textarea></div>

    <div class="field"><label>Revision Count</label><div class="counter">
      <button data-counter="revisionCount" data-dir="-1" data-id="${c.id}">−</button><span>${c.revisionCount}</span>
      <button data-counter="revisionCount" data-dir="1" data-id="${c.id}">+</button></div></div>
    <div class="field"><label>Practice Count</label><div class="counter">
      <button data-counter="practiceCount" data-dir="-1" data-id="${c.id}">−</button><span>${c.practiceCount}</span>
      <button data-counter="practiceCount" data-dir="1" data-id="${c.id}">+</button></div></div>
    <div class="field"><label>Mock Test Count</label><div class="counter">
      <button data-counter="mockTestCount" data-dir="-1" data-id="${c.id}">−</button><span>${c.mockTestCount}</span>
      <button data-counter="mockTestCount" data-dir="1" data-id="${c.id}">+</button></div></div>
    <div class="field"><label>Last Revision Date</label><input type="date" data-field="lastRevisionDate" data-id="${c.id}" value="${c.lastRevisionDate}"></div>

    <div class="field"><label>Difficulty</label><select data-field="difficulty" data-id="${c.id}">
      ${['Easy','Medium','Hard'].map(d=>`<option value="${d}" ${c.difficulty===d?'selected':''}>${d}</option>`).join('')}
    </select></div>
    <div class="field"><label>Priority</label><select data-field="priority" data-id="${c.id}">
      ${['Low','Medium','High'].map(d=>`<option value="${d}" ${c.priority===d?'selected':''}>${d}</option>`).join('')}
    </select></div>
    <div class="field"><label>Confidence (1-5)</label><input type="text" inputmode="numeric" maxlength="1" data-field="confidence" data-id="${c.id}" value="${c.confidence}"></div>
    <div class="field"><label>Target Date</label><input type="date" data-field="targetDate" data-id="${c.id}" value="${c.targetDate}"></div>

    <div class="field"><label>Completion Date</label><input type="date" data-field="completionDate" data-id="${c.id}" value="${c.completionDate}" ${c.completed?'':'disabled'}></div>
    <div class="field"><label>Personal Rating</label><div class="rating-stars" data-id="${c.id}">
      ${[1,2,3,4,5].map(n=>`<span data-star="${n}" class="${c.personalRating>=n?'on':''}">★</span>`).join('')}
    </div></div>
    <div class="field"><label>Color Label</label><div class="color-dots" data-id="${c.id}">
      ${COLOR_LABELS.map(cl=>`<div class="color-dot ${c.colorLabel===cl.id?'selected':''}" data-color="${cl.id}" style="background:${cl.hex==='transparent'?'rgba(255,255,255,0.08)':cl.hex}"></div>`).join('')}
    </div></div>
    <div class="field"><label>&nbsp;</label>
      <label class="check-field"><input type="checkbox" data-field="coachingFinished" data-id="${c.id}" ${c.coachingFinished?'checked':''}> Coaching Finished</label>
      <label class="check-field" style="margin-top:4px;"><input type="checkbox" data-field="studentFinished" data-id="${c.id}" ${c.studentFinished?'checked':''}> Student Finished</label>
    </div>
  </div>`;
}

/* ===================== EVENT HANDLERS ===================== */
function attachSyllabusHandlers(subj){
  document.getElementById('searchInput').addEventListener('input', e=>{
    const pos = e.target.selectionStart;
    searchTerm=e.target.value;
    renderSyllabus(subj, labelFor(subj));
    const ni = document.getElementById('searchInput');
    if(ni){ ni.focus(); ni.setSelectionRange(pos,pos); }
  });
  document.getElementById('priorityFilter').value = filterPriority;
  document.getElementById('priorityFilter').addEventListener('change', e=>{filterPriority=e.target.value; renderSyllabus(subj, labelFor(subj));});
  document.getElementById('backlogFilterBtn').addEventListener('click', ()=>{filterBacklogOnly=!filterBacklogOnly; renderSyllabus(subj, labelFor(subj));});
  document.getElementById('expandAll').addEventListener('click', ()=>{STATE[subj].forEach((g,gi)=>collapsedGroups[subj+gi]=false); renderSyllabus(subj, labelFor(subj));});
  document.getElementById('collapseAll').addEventListener('click', ()=>{STATE[subj].forEach((g,gi)=>collapsedGroups[subj+gi]=true); renderSyllabus(subj, labelFor(subj));});

  document.querySelectorAll('.group-header').forEach(el=>{
    el.addEventListener('click', ()=>{
      const key = el.dataset.gkey;
      collapsedGroups[key] = !collapsedGroups[key];
      renderSyllabus(subj, labelFor(subj));
    });
  });

  document.querySelectorAll('[data-row-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-complete-toggle]')) return;
      const id = el.dataset.rowToggle;
      openRows[id] = !openRows[id];
      renderSyllabus(subj, labelFor(subj));
    });
  });

  document.querySelectorAll('[data-complete-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      handleCompleteToggle(el.dataset.completeToggle, subj);
    });
  });

  // detail field bindings
  document.querySelectorAll('[data-field]').forEach(el=>{
    const evt = (el.tagName==='SELECT' || el.type==='date' || el.type==='checkbox') ? 'change' : 'input';
    el.addEventListener(evt, ()=>{
      const id = el.dataset.id, field = el.dataset.field;
      const found = findChapter(id); if(!found) return;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='confidence'){ val = Math.max(1, Math.min(5, parseInt(val)||1)); }
      found.c[field] = val;
      if(field==='coachingFinished' || field==='studentFinished'){
        recalcBacklog(found.c);
      }
      saveSubject(subj);
      if(field==='coachingFinished' || field==='studentFinished'){ renderSyllabus(subj, labelFor(subj)); }
    });
  });

  document.querySelectorAll('[data-counter]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id=el.dataset.id, field=el.dataset.counter, dir=parseInt(el.dataset.dir);
      const found=findChapter(id); if(!found) return;
      found.c[field] = Math.max(0, found.c[field]+dir);
      saveSubject(subj);
      renderSyllabus(subj, labelFor(subj));
    });
  });

  document.querySelectorAll('.rating-stars').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const star = e.target.closest('[data-star]'); if(!star) return;
      const id = el.dataset.id, n = parseInt(star.dataset.star);
      const found = findChapter(id); if(!found) return;
      found.c.personalRating = found.c.personalRating===n ? n-1 : n;
      saveSubject(subj);
      renderSyllabus(subj, labelFor(subj));
    });
  });

  document.querySelectorAll('.color-dots').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const dot = e.target.closest('[data-color]'); if(!dot) return;
      const id = el.dataset.id;
      const found = findChapter(id); if(!found) return;
      found.c.colorLabel = dot.dataset.color;
      saveSubject(subj);
      renderSyllabus(subj, labelFor(subj));
    });
  });
}

function recalcBacklog(c){
  c.backlog = !!(c.coachingFinished && !c.studentFinished && !c.completed);
  if(c.backlog && c.priority!=='High'){ c.priority='High'; }
}

function labelFor(subj){
  return subj==='maths'?'Mathematics':subj==='physics'?'Physics':'Chemistry';
}

/* ===================== COMPLETE / INCOMPLETE FLOW ===================== */
let pendingAction=null;

function handleCompleteToggle(id, subj){
  const found = findChapter(id); if(!found) return;
  const c = found.c;
  const overlay = document.getElementById('confirmOverlay');
  const modal = document.getElementById('confirmModal');
  const title = document.getElementById('confirmTitle');
  const text = document.getElementById('confirmText');

  if(!c.completed){
    title.textContent = `Mark "${c.name}" as complete?`;
    text.textContent = "This locks in your completion date, awards XP and coins, and updates progress everywhere.";
    modal.classList.remove('danger-modal'); modal.classList.add('success-modal');
    document.getElementById('confirmYes').className='btn-primary';
    pendingAction = ()=>{
      c.completed = true;
      c.completionDate = fmtDate();
      c.backlog = false;
      saveSubject(subj);
      celebrate(c.name, 50, 10);
      awardXP(50, 10);
      checkAchievements();
    };
  } else {
    title.textContent = `Mark "${c.name}" as incomplete?`;
    text.textContent = "This reopens the chapter, clears the completion date, and may re-trigger backlog if coaching is already finished. Consider a quick recovery plan: 1 revision pass + 10 practice problems before your next mock.";
    modal.classList.remove('success-modal'); modal.classList.add('danger-modal');
    document.getElementById('confirmYes').className='btn-danger';
    pendingAction = ()=>{
      c.completed = false;
      c.completionDate = '';
      recalcBacklog(c);
      saveSubject(subj);
      renderSyllabus(subj, labelFor(subj));
      toast(`"${c.name}" marked incomplete. Recovery plan suggested — see chapter notes.`);
    };
  }
  overlay.classList.add('show');
}

document.getElementById('confirmNo').addEventListener('click', ()=>{
  document.getElementById('confirmOverlay').classList.remove('show');
  pendingAction=null;
});
document.getElementById('confirmYes').addEventListener('click', ()=>{
  document.getElementById('confirmOverlay').classList.remove('show');
  if(pendingAction) pendingAction();
  pendingAction=null;
  renderCurrentView();
  refreshTopbar();
});
document.getElementById('formCancel').addEventListener('click', closeForm);

function celebrate(chapterName, xp=50, coins=10){
  const overlay = document.getElementById('celebrateOverlay');
  document.getElementById('celebrateChapter').textContent = `${chapterName} — Complete!`;
  document.getElementById('celebrateQuote').textContent = QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('xpGain').textContent = xp;
  document.getElementById('coinGain').textContent = coins;

  // confetti
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className='confetti-piece';
    const colors=['#10b981','#3b6cf6','#f0b429','#22c55e'];
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (1.6+Math.random()*1.2)+'s';
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    overlay.appendChild(p);
    setTimeout(()=>p.remove(), 3000);
  }

  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'), 2200);
}

function awardXP(xp, coins){
  STATE.profile.xp += xp;
  STATE.profile.coins += coins;
  STATE.profile.level = Math.floor(STATE.profile.xp/500)+1;
  const today = fmtDate();
  if(STATE.profile.lastActiveDate !== today){
    STATE.profile.streak += 1;
    STATE.profile.lastActiveDate = today;
  }
  saveProfile();
  refreshTopbar();
}

/* ===================== GENERIC FORM OVERLAY ===================== */
function closeForm(){ document.getElementById('formOverlay').classList.remove('show'); }

/* ===================== RENDER: CHALLENGES ===================== */
function renderChallenges(){
  const sections = [['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']];
  let html = `
  <div class="view-header">
    <div class="view-title-wrap"><div class="view-title">Challenge System</div><div class="view-sub">Daily · Weekly · Monthly targets</div></div>
  </div>

  <div class="section-title">Achievements</div>
  <div class="achv-grid">
    ${ACHIEVEMENTS.map(a=>{
      const unlocked = STATE.profile.unlockedAchievements.includes(a.id);
      return `<div class="achv-badge glass-card ${unlocked?'unlocked':''}">
        <div class="achv-icon">${a.abbr}</div>
        <div class="achv-name">${a.name}</div>
        <div class="achv-desc">${a.desc}</div>
      </div>`;
    }).join('')}
  </div>
  `;

  sections.forEach(([key,label])=>{
    const list = STATE.challenges[key];
    const st = challengeStats(key);
    html += `<div class="challenge-section">
      <div class="view-header" style="margin-bottom:10px;">
        <div class="syl-title-wrap">
          <div class="syl-title" style="font-size:16px;">${label} Challenges</div>
          <div class="syl-progress-mini"><div class="bar-track" style="width:100px;"><div class="bar-fill" style="width:${st.pct}%"></div></div>${st.done}/${st.total}</div>
        </div>
        <button class="btn-add" data-add-challenge="${key}">+ New ${label} Challenge</button>
      </div>
      ${list.length ? `<div class="chart-card glass-card">${svgBarChart(list.map(c=>({label:c.name.length>10?c.name.slice(0,9)+'…':(c.name||'—'), value:c.status==='completed'?100:c.progress})), {height:120, unit:'%'})}</div>` : ''}
      <div class="challenge-grid">
        ${list.length? list.map(c=>renderChallengeCard(c)).join('') : `<div class="glass-card" style="padding:20px;color:var(--text-faint);font-size:12.5px;">No ${label.toLowerCase()} challenges yet. Add one to start earning XP.</div>`}
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
  attachChallengeHandlers();
}

function renderChallengeCard(c){
  const overdue = c.deadline && c.status==='active' && c.deadline < fmtDate();
  return `
  <div class="challenge-card glass-card status-${c.status} ${overdue?'overdue':''}" data-id="${c.id}">
    <button class="card-close" data-delete-challenge="${c.id}">✕</button>
    <div class="challenge-name">${c.name||'Untitled challenge'}</div>
    <div class="challenge-target">${c.target||''}</div>
    <div class="challenge-meta-row">
      <span class="chip priority-${c.difficulty==='Hard'?'High':c.difficulty==='Easy'?'Low':'Medium'}">${c.difficulty}</span>
      ${c.deadline?`<span class="chip">${overdue?'Overdue · ':''}${c.deadline}</span>`:''}
      <span class="chip" style="text-transform:capitalize;">${c.status}</span>
    </div>
    ${c.status==='active' ? `
    <div class="challenge-progress-row">
      <button class="progress-btn" data-progress="${c.id}" data-dir="-1">−</button>
      <div class="bar-track" style="flex:1;"><div class="bar-fill" style="width:${c.progress}%"></div></div>
      <span class="challenge-progress-pct">${c.progress}%</span>
      <button class="progress-btn" data-progress="${c.id}" data-dir="1">+</button>
    </div>` : ''}
    <div class="challenge-bottom-row">
      <button class="complete-toggle ${c.status==='completed'?'done':''}" data-complete-challenge="${c.id}" ${c.status==='failed'?'style="opacity:.3;pointer-events:none;"':''}>
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#04140f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="reward-text">+${c.rewardXP} XP · +${c.rewardCoins} coins</span>
      ${c.status==='active' ? `<button class="chal-link" data-fail-challenge="${c.id}">Mark failed</button>` : (c.status==='failed' ? `<button class="chal-link" data-reopen-challenge="${c.id}">Reopen</button>` : '')}
    </div>
  </div>`;
}

function attachChallengeHandlers(){
  document.querySelectorAll('[data-add-challenge]').forEach(el=>{
    el.addEventListener('click', ()=>openChallengeForm(el.dataset.addChallenge));
  });
  document.querySelectorAll('[data-delete-challenge]').forEach(el=>{
    el.addEventListener('click', ()=>confirmDeleteChallenge(el.dataset.deleteChallenge));
  });
  document.querySelectorAll('[data-complete-challenge]').forEach(el=>{
    el.addEventListener('click', ()=>handleChallengeComplete(el.dataset.completeChallenge));
  });
  document.querySelectorAll('[data-fail-challenge]').forEach(el=>{
    el.addEventListener('click', ()=>confirmFailChallenge(el.dataset.failChallenge));
  });
  document.querySelectorAll('[data-reopen-challenge]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const found = findChallenge(el.dataset.reopenChallenge); if(!found) return;
      found.c.status='active'; saveChallenges(); renderChallenges();
      toast('Challenge reopened.');
    });
  });
  document.querySelectorAll('[data-progress]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const found = findChallenge(el.dataset.progress); if(!found) return;
      const dir = parseInt(el.dataset.dir);
      found.c.progress = Math.max(0, Math.min(100, found.c.progress + dir*10));
      saveChallenges();
      renderChallenges();
    });
  });
}

function handleChallengeComplete(id){
  const found = findChallenge(id); if(!found) return;
  const c = found.c;
  if(c.status==='failed') return;
  const overlay = document.getElementById('confirmOverlay');
  const modal = document.getElementById('confirmModal');
  const title = document.getElementById('confirmTitle');
  const text = document.getElementById('confirmText');
  if(c.status!=='completed'){
    title.textContent = `Mark "${c.name}" as complete?`;
    text.textContent = `Awards +${c.rewardXP} XP and +${c.rewardCoins} coins.`;
    modal.classList.remove('danger-modal'); modal.classList.add('success-modal');
    document.getElementById('confirmYes').className='btn-primary';
    pendingAction = ()=>{
      c.status='completed'; c.progress=100; c.completionDate=fmtDate();
      saveChallenges();
      celebrate(c.name, c.rewardXP, c.rewardCoins);
      awardXP(c.rewardXP, c.rewardCoins);
      checkAchievements();
    };
  } else {
    title.textContent = `Reopen "${c.name}"?`;
    text.textContent = "This marks the challenge active again. XP and coins already earned stay with you.";
    modal.classList.remove('success-modal'); modal.classList.add('danger-modal');
    document.getElementById('confirmYes').className='btn-danger';
    pendingAction = ()=>{
      c.status='active'; c.completionDate='';
      saveChallenges();
      toast(`"${c.name}" reopened.`);
    };
  }
  overlay.classList.add('show');
}

function confirmFailChallenge(id){
  const found = findChallenge(id); if(!found) return;
  const c = found.c;
  const overlay = document.getElementById('confirmOverlay');
  const modal = document.getElementById('confirmModal');
  document.getElementById('confirmTitle').textContent = `Mark "${c.name}" as failed?`;
  document.getElementById('confirmText').textContent = c.penalty ? `Noted consequence: ${c.penalty}` : "This just logs it as missed — no XP or coins are taken away.";
  modal.classList.remove('success-modal'); modal.classList.add('danger-modal');
  document.getElementById('confirmYes').className='btn-danger';
  pendingAction = ()=>{
    c.status='failed';
    saveChallenges();
    toast(`"${c.name}" marked as missed. On to the next one.`);
  };
  overlay.classList.add('show');
}

function confirmDeleteChallenge(id){
  const found = findChallenge(id); if(!found) return;
  const overlay = document.getElementById('confirmOverlay');
  const modal = document.getElementById('confirmModal');
  document.getElementById('confirmTitle').textContent = `Delete "${found.c.name||'this challenge'}"?`;
  document.getElementById('confirmText').textContent = "This can't be undone.";
  modal.classList.remove('success-modal'); modal.classList.add('danger-modal');
  document.getElementById('confirmYes').className='btn-danger';
  pendingAction = ()=>{

function renderHeatmap(){
  const monthNames=['Jul','Aug','Sep','Oct','Nov','Dec'];
  let out='';
  monthNames.forEach((mn,i)=>{
    const monthIdx=6+i;
    const dim = new Date(2026,monthIdx+1,0).getDate();
    let cells='';
    for(let day=1; day<=dim; day++){
      const ds = fmtDate(new Date(2026,monthIdx,day));
      const h = hoursForDate(ds);
      const ratio = h/6;
      let lvl = h<=0?0: ratio<0.34?1: ratio<0.7?2: ratio<1?3:4;
      cells += `<div class="heatmap-cell lvl${lvl}" title="${ds}: ${h.toFixed(1)}h"></div>`;
    }
    out += `<div class="heatmap-month-row"><div class="heatmap-month-label">${mn}</div><div class="heatmap-cells">${cells}</div></div>`;
  });
  return out;
}

function attachStudyHandlers(){
  document.getElementById('openLogForm').addEventListener('click', openLogHoursForm);
  document.getElementById('timerToggle').addEventListener('click', ()=>{
    if(STATE.study.timer.running){
      STATE.study.timer.accumulatedSeconds += (Date.now()-STATE.study.timer.startTs)/1000;
      STATE.study.timer.running=false; STATE.study.timer.startTs=null;
    } else {
      STATE.study.timer.running=true; STATE.study.timer.startTs=Date.now();
    }
    saveStudy();
    renderStudyHours();
  });
  document.getElementById('timerReset').addEventListener('click', ()=>{
    STATE.study.timer = {running:false, startTs:null, accumulatedSeconds:0};
    saveStudy();
    renderStudyHours();
  });
  document.getElementById('timerLog').addEventListener('click', ()=>{
    let secs = STATE.study.timer.accumulatedSeconds + (STATE.study.timer.running? (Date.now()-STATE.study.timer.startTs)/1000 : 0);
    if(secs<30){ toast('Timer is almost empty — keep going a bit longer before logging.'); return; }
    const hrs = secs/3600;
    const today = fmtDate();
    STATE.study.log[today] = (STATE.study.log[today]||0) + hrs;
    STATE.study.timer = {running:false, startTs:null, accumulatedSeconds:0};
    saveStudy();
    checkAchievements();
    toast(`Logged ${hrs.toFixed(2)}h to today.`);
    renderStudyHours();
  });
}

function tickTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  if(!el) return;
  let secs = STATE.study.timer.accumulatedSeconds + (STATE.study.timer.running? (Date.now()-STATE.study.timer.startTs)/1000 : 0);
  const h = String(Math.floor(secs/3600)).padStart(2,'0');
  const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
  const s = String(Math.floor(secs%60)).padStart(2,'0');
  el.textContent = `${h}:${m}:${s}`;
  el.classList.toggle('running', STATE.study.timer.running);
}

/* ===================== RENDER: CALENDAR ===================== */
function renderCalendar(){
  const y=2026, m = calendarMonth.getMonth();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const dim = new Date(y,m+1,0).getDate();
  const deadlines = gatherDeadlines();
  const todayStr = fmtDate();

  const target = new Date(2026,11,31);
  const now = new Date();
  const diffDays = Math.max(0, Math.ceil((target-now)/86400000));
  const diffWeeks = Math.floor(diffDays/7);
  const diffMonths = Math.max(0,(target.getFullYear()-now.getFullYear())*12 + (target.getMonth()-now.getMonth()));

  let cells='';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let day=1; day<=dim; day++){
    const ds = fmtDate(new Date(y,m,day));
    const isToday = ds===todayStr;
    const holiday = HOLIDAYS[ds];
    const dl = deadlines[ds]||[];
    cells += `<div class="cal-cell ${isToday?'today':''} ${holiday?'holiday':''}" title="${[holiday, ...dl].filter(Boolean).join(' · ')}">
      <div class="cal-daynum">${day}</div>
      ${holiday?`<div class="cal-holiday-label">${holiday}</div>`:''}
      ${dl.length?`<div class="cal-dots">${dl.slice(0,4).map(()=>'<div class="cal-dot"></div>').join('')}</div>`:''}
    </div>`;
  }

  let html = `
  <div class="view-header">
    <div class="view-title-wrap"><div class="view-title">Calendar</div><div class="view-sub">1 Jul 2026 → 31 Dec 2026</div></div>
    <div class="cal-nav">
      <button id="calPrev" ${m<=6?'disabled':''}>‹</button>
      <div class="cal-month-label">${monthNames[m]} ${y}</div>
      <button id="calNext" ${m>=11?'disabled':''}>›</button>
    </div>
  </div>

  <div class="countdown-strip">
    <div class="stat-box glass-card"><b>${diffDays}</b><span>Days Remaining</span></div>
    <div class="stat-box glass-card"><b>${diffWeeks}</b><span>Weeks Remaining</span></div>
    <div class="stat-box glass-card"><b>${diffMonths}</b><span>Months Remaining</span></div>
  </div>

  <div class="glass-card" style="padding:18px;">
    <div class="cal-legend">
      <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--emerald);box-shadow:0 0 6px var(--emerald);"></span>Today</div>
      <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--gold);"></span>Holiday</div>
      <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--royal);"></span>Chapter / Challenge deadline</div>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  </div>
  `;
  document.getElementById('content').innerHTML = html;
  document.getElementById('calPrev').addEventListener('click', ()=>{ if(m>6){ calendarMonth=new Date(y,m-1,1); renderCalendar(); }});
  document.getElementById('calNext').addEventListener('click', ()=>{ if(m<11){ calendarMonth=new Date(y,m+1,1); renderCalendar(); }});
}

function renderNotesChapterListHTML(){
  const groups = STATE[notesSubject];
  const term = notesSearchTerm.toLowerCase();
  let out='';
  groups.forEach(g=>{
    const rows = g.chapters.filter(c=>{
      if(!term) return true;
      const note = getNote(notesSubject, c.id);
      return c.name.toLowerCase().includes(term) || (note.content||'').toLowerCase().includes(term) || (note.tags||[]).some(t=>t.toLowerCase().includes(term));
    });
    if(!rows.length) return;
    const sorted = [...rows].sort((a,b)=>{
      const na=getNote(notesSubject,a.id), nb=getNote(notesSubject,b.id);
      return (nb.pinned?1:0)-(na.pinned?1:0);
    });
    out += `<div class="notes-group-label">${g.group}</div>`;
    sorted.forEach(c=>{
      const note = getNote(notesSubject, c.id);
      out += `<div class="notes-chapter-item ${c.id===notesSelectedChapterId?'active':''}" data-notes-chapter="${c.id}">
        ${note.pinned?'<span class="pin-star">★</span>':''}
        <span>${c.name}</span>
        ${note.content?'<span class="has-dot"></span>':''}
        ${note.tags&&note.tags.length?`<span class="tiny-tags">${note.tags.slice(0,2).map(t=>`<span class="notes-tag-chip">${t}</span>`).join('')}</span>`:''}
      </div>`;
    });
  });
  return out || `<div style="padding:20px;color:var(--text-faint);font-size:12px;">No matches.</div>`;
}

function renderHistoryPanelHTML(note){
  if(!note.history.length) return `<div class="history-panel"><div class="history-empty">No saved versions yet. Click "Save Version" to snapshot the current text.</div></div>`;
  const rows = [...note.history].map((h,idx)=>idx).reverse().map(idx=>{
    const h = note.history[idx];
    const d = new Date(h.ts);
    const preview = h.content.slice(0,40).replace(/\n/g,' ');
    return `<div class="history-entry">
      <span>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} · ${escapeHtml(preview)}${h.content.length>40?'…':''}</span>
      <button data-restore-history="${idx}">Restore</button>
    </div>`;
  }).join('');
  return `<div class="history-panel">${rows}</div>`;
}

function handleNoteInput(){
  const ta = document.getElementById('noteTextarea');
  if(!ta) return;
  const note = getNote(notesSubject, notesSelectedChapterId);
  note.content = ta.value;
  note.updatedAt = new Date().toISOString();
  setNote(notesSubject, notesSelectedChapterId, note);
  const ind = document.getElementById('saveIndicator');
  if(ind){
    ind.textContent = 'Saving…';
    clearTimeout(window.__noteIndTimer);
    window.__noteIndTimer = setTimeout(()=>{ if(ind && ind.isConnected) ind.textContent='Saved'; }, 500);
  }
}

function wrapSelection(mark){
  const ta = document.getElementById('noteTextarea'); if(!ta) return;
  const start=ta.selectionStart, end=ta.selectionEnd;
  const sel = ta.value.slice(start,end);
  ta.value = ta.value.slice(0,start)+mark+sel+mark+ta.value.slice(end);
  ta.focus();
  ta.setSelectionRange(start+mark.length, start+mark.length+sel.length);
  handleNoteInput();
}
function prefixLine(mark){
  const ta = document.getElementById('noteTextarea'); if(!ta) return;
  const start=ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', start-1)+1;
  ta.value = ta.value.slice(0,lineStart)+mark+ta.value.slice(lineStart);
  ta.focus();
  ta.setSelectionRange(start+mark.length, start+mark.length);
  handleNoteInput();
}
function insertImageAtCursor(){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim=900;
        let w=img.width, h=img.height;
        if(w>maxDim||h>maxDim){ const scale=maxDim/Math.max(w,h); w=Math.round(w*scale); h=Math.round(h*scale); }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg',0.82);
        const ta = document.getElementById('noteTextarea'); if(!ta) return;
        const pos = ta.selectionStart;
        const insertion = `\n![image](${dataUrl})\n`;
        ta.value = ta.value.slice(0,pos)+insertion+ta.value.slice(pos);
        ta.focus();
        ta.setSelectionRange(pos+insertion.length, pos+insertion.length);
        handleNoteInput();
        toast('Image compressed and inserted.');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

/* ===================== RENDER: DAILY REVIEW ===================== */
function reviewSeries(field){
  const out=[]; const today=new Date(); today.setHours(0,0,0,0);
  for(let i=13;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const ds = fmtDate(d);
    const r = STATE.dailyReview[ds];
    out.push({label:d.getDate()+'', value: r? r[field] : 0});
  }
  return out;
}

function renderTimelineListHTML(review){
  if(!review.timeline.length) return `<div class="timeline-empty">No entries yet for this day.</div>`;
  const sorted = [...review.timeline].sort((a,b)=>a.time.localeCompare(b.time));
  return sorted.map(e=>`<div class="timeline-entry">
    <span class="timeline-time">${e.time}</span>
    <span class="timeline-note">${escapeHtml(e.note)}</span>
    <button class="timeline-del" data-tl-del="${e.id}">✕</button>
  </div>`).join('');
}

  </div>

  <div class="reflect-grid">
    <div class="glass-card" style="padding:18px;">
      <div class="section-title">Hour Log / Timeline</div>
      <div class="timeline-add">
        <input type="time" id="tlTime" value="09:00">

    <div class="glass-card" style="padding:18px;">

      </div>
      <div class="reflect-field">

        <div class="slider-row"><input type="range" min="1" max="5" value="${review.focus}" id="focusSlider"><span class="slider-val" id="focusVal">${review.focus}</span></div>
      </div>
      <div class="reflect-field">
        <label>Mood</label>
        <div class="mood-grid">
          ${MOODS.map(m=>`<button class="mood-btn ${review.mood===m?'selected':''}" data-mood="${m}">${m}</button>`).join('')}

      </div>
    </div>

  <div class="reflect-grid">
    <div class="reflect-field"><label>Distractions</label><textarea id="rDistractions" placeholder="What pulled your focus away?">${escapeHtml(review.distractions||'')}</textarea></div>
    <div class="reflect-field"><label>Wins</label><textarea id="rWins" placeholder="What went right today?">${escapeHtml(review.wins||'')}</textarea></div>
  </div>
  <div class="reflect-grid">

    <div class="reflect-field"><label>Tomorrow's Plan</label><textarea id="rTomorrow" placeholder="What's the plan for tomorrow?">${escapeHtml(review.tomorrowPlan||'')}</textarea></div>
  </div>

  <div class="chart-card glass-card">
    <div class="section-title">Energy & Focus — Last 14 Days</div>
    <div class="chart-note">Emerald is energy, blue is focus, both on a 1–5 scale.</div>
    ${svgLineChart(reviewSeries('energy'), {height:120, color:'#10b981'})}
    ${svgLineChart(reviewSeries('focus'), {height:120, color:'#3b6cf6'})}
  </div>
  `;
  document.getElementById('content').innerHTML = html;
  attachDailyReviewHandlers();
